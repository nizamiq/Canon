id: phase_01_core_service
title: "Phase 01: Core Service Implementation"
description: "Build the core Canon FastAPI service with database models, migrations, and RESTful API endpoints."
status: COMPLETE
completed_at: "2026-02-24"
dependencies:
  - phase_00_init

tasks:
  - id: T01.1
    title: "Create FastAPI application skeleton"
    description: "Initialize the FastAPI app with proper middleware, CORS, and health check endpoints."
    verification: "FastAPI app starts and responds to /health endpoint."
    status: COMPLETE
    completed_at: "2026-02-23"
    proof_of_work: "src/canon/main.py with lifespan, CORS middleware, router includes"

  - id: T01.2
    title: "Create SQLAlchemy async models"
    description: "Create the database models: canon_prompts, canon_prompt_versions, canon_version_tags, canon_audit_log."
    verification: "Models defined with proper relationships and async support."
    status: COMPLETE
    completed_at: "2026-02-23"
    proof_of_work: "src/canon/models/prompt.py with Prompt, PromptVersion, VersionTag, AuditLog models"

  - id: T01.3
    title: "Create Alembic migrations"
    description: "Initialize Alembic and create initial migration for all database tables."
    verification: "alembic upgrade head creates all tables in PostgreSQL."
    status: COMPLETE
    completed_at: "2026-02-24"
    proof_of_work: "alembic/env.py with async support, alembic/versions/001_initial.py with all tables"

  - id: T01.4
    title: "Implement JWT authentication middleware"
    description: "Add Zitadel JWT validation middleware for all API endpoints."
    verification: "Unauthenticated requests return 401, valid JWTs are accepted."
    status: COMPLETE
    completed_at: "2026-02-24"
    proof_of_work: "src/canon/core/auth.py with verify_jwt, get_current_user, require_roles"

  - id: T01.5
    title: "Implement prompt CRUD endpoints"
    description: "Create RESTful endpoints: GET /v1/prompts, POST /v1/prompts, GET /v1/prompts/{name}."
    verification: "All endpoints work with proper request/response schemas."
    status: COMPLETE
    completed_at: "2026-02-24"
    proof_of_work: "src/canon/api/v1/endpoints/prompts.py with full CRUD using PromptService"

  - id: T01.6
    title: "Implement versioning logic"
    description: "Add version creation and immutable storage logic for prompts."
    verification: "Creating a prompt version stores immutable content snapshot."
    status: COMPLETE
    completed_at: "2026-02-24"
    proof_of_work: "PromptService.create_version with immutable storage, auto-increment"

  - id: T01.7
    title: "Implement tagging system"
    description: "Add mutable tag management (production, staging, etc.) for prompt versions."
    verification: "Tags can be created, moved, and listed."
    status: COMPLETE
    completed_at: "2026-02-24"
    proof_of_work: "GET/PUT/DELETE /{name}/tags/{tag}, GET /{name}/tag/{tag} for consumer lookup"

  - id: T01.8
    title: "Implement audit logging"
    description: "Add comprehensive audit logging for all governance-relevant actions."
    verification: "All create, update, and approval actions are logged."
    status: COMPLETE
    completed_at: "2026-02-24"
    proof_of_work: "src/canon/services/audit.py with AuditService, log_prompt_create, log_version_create, log_tag_update"

  - id: T01.9
    title: "Add Aegis SDK integration"
    description: "Integrate Aegis SDK for RBAC enforcement on prompt operations."
    verification: "RBAC permissions checked for create, edit, approve actions."
    status: COMPLETE
    completed_at: "2026-02-24"
    proof_of_work: "src/canon/core/aegis.py with AegisClient, check_permission, check_prompt_permission"

  - id: T01.10
    title: "Create OpenAPI specification"
    description: "Ensure complete OpenAPI 3.1 spec is generated and documented."
    verification: "/docs endpoint shows complete API documentation."
    status: COMPLETE
    completed_at: "2026-02-23"
    proof_of_work: "FastAPI auto-generates OpenAPI at /docs and /openapi.json"

  - id: T01.11
    title: "Write unit tests"
    description: "Create comprehensive unit tests for all service components."
    verification: "pytest passes with >80% coverage."
    status: COMPLETE
    completed_at: "2026-02-24"
    proof_of_work: "tests/test_api.py, tests/test_services.py, tests/test_auth.py, tests/conftest.py"

  - id: T01.12
    title: "Create Docker configuration"
    description: "Create Dockerfile and docker-compose for local development."
    verification: "docker-compose up runs the full service stack."
    status: COMPLETE
    completed_at: "2026-02-23"
    proof_of_work: "Dockerfile (multi-stage), docker-compose.yml (canon, postgres, redis)"

